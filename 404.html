<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Page not found | Inventadors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Paytone+One&family=Work+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #73e57f;
      --secondary: #092c18;
      --ink: #0e0f0c;
      --muted: #62675f;
      --warm: #ffbf00;
      --surface: #f4f7f2;
      --line: rgba(9, 44, 24, 0.14);
      --font-heading: "Paytone One", system-ui, sans-serif;
      --font-body: "Work Sans", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      font-family: var(--font-body);
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 16%, rgba(115, 229, 127, 0.28), transparent 24rem),
        radial-gradient(circle at 88% 22%, rgba(255, 191, 0, 0.18), transparent 22rem),
        linear-gradient(180deg, #fbfff9 0%, #ffffff 48%, #f6faf4 100%);
    }

    main {
      width: min(100%, 760px);
      padding: clamp(34px, 7vw, 72px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 24px 80px rgba(9, 44, 24, 0.14);
      text-align: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      font-family: var(--font-heading);
      font-size: 20px;
      color: var(--secondary);
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: linear-gradient(135deg, var(--primary), var(--warm));
    }

    .code {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--secondary);
      background: var(--surface);
      font-weight: 800;
      font-size: 13px;
    }

    h1 {
      margin: 18px 0 14px;
      font-family: var(--font-heading);
      font-size: clamp(40px, 8vw, 76px);
      line-height: 1;
      color: var(--secondary);
    }

    p {
      max-width: 560px;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 19px);
      line-height: 1.65;
    }

    .actions {
      margin-top: 32px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
    }

    .primary {
      color: var(--secondary);
      background: var(--primary);
      box-shadow: 0 14px 32px rgba(115, 229, 127, 0.28);
    }

    .secondary {
      color: var(--secondary);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
    }
  </style>
</head>
<body>
  <main>
    <div class="brand" aria-label="Inventadors">
      <span class="brand-mark">I</span>
      <span>Inventadors</span>
    </div>
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you are looking for is not available. It may have moved, or the address may have been typed incorrectly.</p>
    <div class="actions">
      <a class="primary" href="/">Go home</a>
      <a class="secondary" href="/contact">Contact support</a>
    </div>
  </main>
</body>
</html>
